<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Internship Form</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f5f5;
}
.container-box{
    background:white;
    padding:40px;
    margin-top:40px;
    border-radius:8px;
}
</style>

</head>
<body>

<div class="container">
<div class="container-box">

<h2 class="text-center mb-4">Internship Form</h2>

<form id="internForm" novalidate>

<div class="row mb-3">

<div class="col-md-4">
<label class="form-label">First Name</label>
<input type="text" class="form-control" id="fname">
<div class="invalid-feedback">
First name required!
</div>
</div>

<div class="col-md-4">
<label class="form-label">Last Name</label>
<input type="text" class="form-control" id="lname">
<div class="invalid-feedback">
Last name required!
</div>
</div>

<div class="col-md-4">
<label class="form-label">Email Address</label>
<input type="email" class="form-control" id="email" placeholder="xyz@abc.com">
<div class="invalid-feedback">
Email required!
</div>
</div>

</div>


<div class="row mb-3">

<div class="col-md-4">
<label class="form-label">College</label>
<input type="text" class="form-control" id="college">
<div class="invalid-feedback">
Please provide a valid college.
</div>
</div>

<div class="col-md-4">
<label class="form-label">Graduation Year</label>
<select class="form-select" id="gradyear">
<option value="">Choose...</option>
<option>2024</option>
<option>2025</option>
<option>2026</option>
<option>2027</option>
</select>
<div class="invalid-feedback">
Please select a valid Graduation Year.
</div>
</div>

<div class="col-md-4">
<label class="form-label">Roll No.</label>
<input type="text" class="form-control" id="roll">
<div class="invalid-feedback">
Please provide a valid Roll no.
</div>
</div>

</div>


<div class="form-check mb-3">
<input class="form-check-input" type="checkbox" id="terms">
<label class="form-check-label">
Agree to terms and conditions
</label>
<div class="invalid-feedback">
You must agree before submitting.
</div>
</div>


<button class="btn btn-primary" type="submit">Submit form</button>

</form>

</div>
</div>


<script>

document.getElementById("internForm").addEventListener("submit", function(e){

e.preventDefault()

let valid = true

function check(id){
let field = document.getElementById(id)

if(field.value.trim() === ""){
field.classList.add("is-invalid")
valid=false
}
else{
field.classList.remove("is-invalid")
}
}

check("fname")
check("lname")
check("email")
check("college")
check("roll")

let grad = document.getElementById("gradyear")

if(grad.value === ""){
grad.classList.add("is-invalid")
valid=false
}
else{
grad.classList.remove("is-invalid")
}

let terms = document.getElementById("terms")

if(!terms.checked){
terms.classList.add("is-invalid")
valid=false
}
else{
terms.classList.remove("is-invalid")
}

if(valid){
alert("Form submitted successfully!")
}

})

</script>

</body>
</html>
